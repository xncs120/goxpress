root = "."

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./server/main.go"
  exclude_dir = ["tmp", "client"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "tpl", "html"]
  delay = 1000
  log = "build-errors.log"
  stop_on_error = true

[misc]
  clean_on_exit = true